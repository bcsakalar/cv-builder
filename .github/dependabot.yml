version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:15"

  - package-ecosystem: "docker"
    directory: "/packages/backend"
    schedule:
      interval: monthly

  - package-ecosystem: "docker"
    directory: "/packages/frontend"
    schedule:
      interval: monthly